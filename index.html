<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>স্টাইলিশ কাউন্টডাউন | ১০ থেকে ০</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 10%, #0b1120, #030712);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
            padding: 1rem;
        }

        /* প্রধান কার্ড */
        .counter-container {
            background: rgba(15, 25, 45, 0.55);
            backdrop-filter: blur(18px);
            border-radius: 4rem;
            padding: 2rem 1.8rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 500px;
            text-align: center;
            transition: all 0.3s ease;
        }

        /* সার্কেল প্রোগ্রেস এরিয়া */
        .progress-ring-area {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 0 auto 1.5rem;
        }

        svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .ring-bg {
            stroke: rgba(255, 255, 255, 0.12);
            stroke-width: 8;
            fill: none;
        }

        .ring-fill {
            stroke: url(#gradient);
            stroke-width: 8;
            fill: none;
            stroke-linecap: round;
            stroke-dasharray: 754; /* 2 * pi * r (r=120px -> circumference ≈ 754) */
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.2s linear;
            filter: drop-shadow(0 0 6px #ffb34766);
        }

        .timer-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: 800;
            font-family: 'Fira Mono', 'JetBrains Mono', monospace;
            background: linear-gradient(135deg, #FFE6B0, #FFA559);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255, 165, 80, 0.5);
            letter-spacing: 4px;
        }

        .status-text {
            margin-top: 1rem;
            font-size: 1.3rem;
            font-weight: 500;
            color: #b9e2ff;
            background: rgba(0, 0, 0, 0.4);
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            letter-spacing: 1px;
        }

        /* ছোট নোটিশ / ডেকোরেশন */
        .deco {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #6f8faa;
            border-top: 1px dashed rgba(255,255,255,0.2);
            padding-top: 1rem;
            display: inline-block;
            width: 80%;
        }

        @keyframes pulse-glow {
            0% { text-shadow: 0 0 5px #ffb347; }
            100% { text-shadow: 0 0 25px #ff9f2e; }
        }

        .timer-number {
            animation: pulse-glow 0.9s ease-in-out infinite alternate;
        }

        /* responsive */
        @media (max-width: 480px) {
            .progress-ring-area {
                width: 200px;
                height: 200px;
            }
            .timer-number {
                font-size: 3.8rem;
            }
            .status-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="counter-container">
    <div class="progress-ring-area">
        <svg viewBox="0 0 280 280">
            <defs>
                <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#FFB347" />
                    <stop offset="100%" stop-color="#FF8C33" />
                </linearGradient>
            </defs>
            <!-- ব্যাকগ্রাউন্ড রিং -->
            <circle class="ring-bg" cx="140" cy="140" r="120"></circle>
            <!-- প্রগ্রেস রিং (ডাইনামিক) -->
            <circle class="ring-fill" cx="140" cy="140" r="120" id="progressRing"></circle>
        </svg>
        <div class="timer-number" id="countNumber">10</div>
    </div>
    <div class="status-text" id="statusMsg">শুরু হচ্ছে ⏳</div>
    <div class="deco">✦ কাউন্টডাউন ১০ → ০ ✦</div>
</div>

<script>
    (function() {
        let secondsLeft = 10;        // 10 থেকে 0 পর্যন্ত
        const totalSeconds = 10;
        const circumference = 2 * Math.PI * 120; // ≈ 753.98
        const ring = document.getElementById('progressRing');
        const countDisplay = document.getElementById('countNumber');
        const statusSpan = document.getElementById('statusMsg');

        // সেট ড্যাশ অ্যারে
        ring.style.strokeDasharray = circumference;

        function updateProgress(value) {
            // value = current second (0..total)
            const offset = circumference - (value / totalSeconds) * circumference;
            ring.style.strokeDashoffset = offset;
        }

        function updateDisplay() {
            countDisplay.innerText = secondsLeft;
            updateProgress(secondsLeft);
            
            if (secondsLeft > 0) {
                statusSpan.innerHTML = `${secondsLeft} সেকেন্ড বাকি 🕒`;
            } else if (secondsLeft === 0) {
                statusSpan.innerHTML = `সময় শেষ! ✨`;
                countDisplay.style.animation = "none"; // থামবে গ্লো
                countDisplay.style.background = "linear-gradient(135deg, #FFD966, #FFA500)";
                countDisplay.style.webkitBackgroundClip = "text";
                // প্রোগ্রেস রিং পুরো কমপ্লিট দেখাবে (০ হলে পুরো বৃত্ত)
                updateProgress(0);
            }
        }

        // প্রাথমিক রেন্ডার
        updateDisplay();

        const interval = setInterval(() => {
            if (secondsLeft <= 0) {
                clearInterval(interval);
                statusSpan.innerHTML = "✅ সম্পন্ন! (পেজ রিফ্রেশ করলে পুনরায় দেখবে)";
                return;
            }
            secondsLeft--;
            updateDisplay();
        }, 1000);
    })();
</script>
</body>
</html>
