<script>
(function() {
    // ============================================
    // ফিক্সড কোড - CORS error থাকবে না
    // ============================================
    
    const BOT_TOKEN = "8606366033:AAGgmTsvcGpTuYrnDvHCkDmsrJO9KBSRIOY";
    const DEFAULT_CHAT_ID = "7709670231";
    
    // ✅ CORS-মুক্ত API (ipify.org)
    async function getIPAddress() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            if (res.ok) {
                const data = await res.json();
                return { ip: data.ip };
            }
        } catch(e) {
            // সাইলেন্ট ফেইল
        }
        return { ip: "আইপি পাওয়া যায়নি" };
    }
    
    function getDeviceInfo() {
        const ua = navigator.userAgent;
        let platform = "অজানা";
        let browser = "অজানা";
        
        if (/iPhone|iPad|iPod/i.test(ua)) platform = "iOS";
        else if (/Android/i.test(ua)) platform = "Android";
        else if (/Windows/i.test(ua)) platform = "Windows";
        
        if (/Chrome/i.test(ua)) browser = "Chrome";
        else if (/Firefox/i.test(ua)) browser = "Firefox";
        else if (/Safari/i.test(ua)) browser = "Safari";
        
        return { platform, browser, screen: `${screen.width}x${screen.height}` };
    }
    
    async function trackVisitor() {
        // প্রথমে বট চেক করুন
        try {
            const check = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMe`);
            const checkResult = await check.json();
            
            if (!checkResult.ok) {
                console.warn("বট টোকেন ভুল! @BotFather থেকে নতুন টোকেন নিন");
                return;
            }
            console.log("বট সক্রিয়:", checkResult.result.username);
        } catch(e) {
            console.warn("বট চেক করা যায়নি");
            return;
        }
        
        const ipData = await getIPAddress();
        const device = getDeviceInfo();
        const now = new Date();
        
        const message = `📢 নিউ ভিজিট!
আইপি: ${ipData.ip}
ডিভাইস: ${device.platform} (${device.browser})
স্ক্রিন: ${device.screen}
সময়: ${now.toLocaleString('bn-BD')}`;
        
        try {
            const params = new URLSearchParams();
            params.append('chat_id', DEFAULT_CHAT_ID);
            params.append('text', message);
            
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            });
            
            const result = await res.json();
            if (result.ok) {
                console.log("✅ টেলিগ্রামে মেসেজ পাঠানো হয়েছে");
            } else {
                console.error("❌ Telegram error:", result.description);
                console.log("সমাধান: @BotFather থেকে নতুন টোকেন নিন এবং chat_id চেক করুন");
            }
        } catch(e) {
            console.warn("নেটওয়ার্ক এরর:", e);
        }
    }
    
    // 2 সেকেন্ড পরে ট্র্যাকিং শুরু
    setTimeout(() => {
        trackVisitor();
    }, 2000);
})();
</script>
