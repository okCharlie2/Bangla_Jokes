<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #fff;
      color: #000;
    }

    .container {
      width: 100%;
      min-height: 100vh;
      padding: 45px 46px;
      position: relative;
    }

    .back {
      font-size: 42px;
      line-height: 1;
      margin-bottom: 70px;
    }

    .logo {
      text-align: center;
      margin-top: -90px;
      margin-bottom: 90px;
    }

    .logo img {
      width: 82px;
    }

    h1 {
      text-align: center;
      font-size: 34px;
      font-weight: 400;
      margin-bottom: 52px;
    }

    label {
      display: block;
      font-size: 27px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      height: 92px;
      border: none;
      border-radius: 5px;
      background: #f5f5f5;
      font-size: 24px;
      padding: 0 18px;
      margin-bottom: 34px;
      outline: none;
    }

    .otp-row {
      display: flex;
      gap: 12px;
      margin-bottom: 34px;
    }

    .otp-row input {
      margin-bottom: 0;
      flex: 1;
    }

    .otp-row button {
      width: 150px;
      border: none;
      border-radius: 5px;
      background: #0b84d8;
      color: #fff;
      font-size: 18px;
      font-weight: 500;
    }

    .continue {
      width: 100%;
      height: 84px;
      border: none;
      border-radius: 6px;
      background: #0b84d8;
      color: #fff;
      font-size: 27px;
      margin-top: 10px;
    }

    .register {
      text-align: center;
      margin-top: 28px;
      font-size: 20px;
    }

    .register a {
      color: #0b84d8;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="back">←</div>

    <div class="logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Telenor_Logo.svg/512px-Telenor_Logo.svg.png" alt="Logo">
    </div>

    <h1>Sign in</h1>

    <label>Your Phone Number</label>
    <input type="tel" />

    <label>Password</label>
    <input type="password" />

    <label>OTP</label>
    <div class="otp-row">
      <input type="text" />
      <button>Send OTP</button>
    </div>

    <button class="continue">Continue</button>

    <div class="register">
      Don’t have an account? <a href="#">Registration</a>
    </div>
  </div>
</body>
</html>
