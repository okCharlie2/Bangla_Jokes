<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কাউন্টডাউন</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0a2f3f, #05161f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 3rem;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            width: 90%;
            max-width: 400px;
        }
        .countdown {
            font-size: 8rem;
            font-weight: 800;
            font-family: monospace;
            background: linear-gradient(135deg, #FFE6B0, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px #ffb34780;
            letter-spacing: 6px;
        }
        .label {
            margin-top: 1rem;
            color: #c9f0ff;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="countdown" id="timerDisplay">10</div>
    <div class="label" id="statusText">অপেক্ষা করুন...</div>
</div>

<script>
    let seconds = 10;
    const timerDisplay = document.getElementById('timerDisplay');
    const statusText = document.getElementById('statusText');

    const interval = setInterval(() => {
        seconds--;
        if (seconds >= 0) {
            timerDisplay.textContent = seconds;
        }
        if (seconds === 0) {
            clearInterval(interval);
            statusText.textContent = "সময় শেষ!";
            timerDisplay.textContent = "0";
        } else if (seconds > 0) {
            statusText.textContent = `${seconds} সেকেন্ড বাকি`;
        }
    }, 1000);
</script>
</body>
</html>
